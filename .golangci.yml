run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/eddyjj92/goravel-inertia
  revive:
    rules:
      # Goravel's http.Context embeds context.Context, so helpers legitimately take
      # it alongside a context.Context; this rule would be a false positive.
      - name: context-as-argument
        disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
