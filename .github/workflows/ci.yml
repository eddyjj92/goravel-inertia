name: CI

on:
  push:
    branches: [develop, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Install golangci-lint from source with the job's Go toolchain so it is built
      # with the same Go version targeted in go.mod. The prebuilt binaries from
      # golangci-lint-action lag behind and reject newer go directives.
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          golangci-lint run ./...

      - name: Test
        run: go test -race -cover ./...
